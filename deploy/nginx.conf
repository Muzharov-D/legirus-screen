# /etc/nginx/sites-available/legirus
# Конфиг для VPS, который раздаёт фронт ФК Легирус и проксирует API на Render.
# После заливки файла:  ln -sf /etc/nginx/sites-available/legirus /etc/nginx/sites-enabled/legirus
# Проверка:              nginx -t && systemctl reload nginx

# HTTP → HTTPS редирект
server {
    listen 80;
    listen [::]:80;
    server_name mobile.legirus.sportdata.tech;

    # ACME challenge для Let's Encrypt — пропускаем без редиректа
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — основной сервер
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name mobile.legirus.sportdata.tech;

    # SSL — заполнит certbot после первого выпуска
    ssl_certificate     /etc/letsencrypt/live/mobile.legirus.sportdata.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mobile.legirus.sportdata.tech/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # HSTS — браузер обязуется ходить только по HTTPS
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    # ───────── Раздача статики Vite (dist/) ─────────

    root /var/www/legirus/dist;
    index index.html;

    # Сжатие
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/javascript application/json application/xml
        application/manifest+json image/svg+xml;

    # Brotli — если установлен модуль (libnginx-mod-http-brotli)
    # brotli on;
    # brotli_comp_level 6;
    # brotli_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml application/manifest+json image/svg+xml;

    # ───────── Vite ассеты с хешем — кешируем агрессивно ─────────
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ───────── Иконки и manifest ─────────
    location /icons/ {
        access_log off;
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # ───────── Service Worker — никогда не кешируем (важно для авто-обновлений!) ─────────
    location = /sw.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        expires off;
        try_files $uri =404;
    }

    # ───────── /api/* — reverse proxy на Render ─────────
    # Браузер думает что API на same-origin (нет CORS),
    # nginx сам ходит на Render серверной стороной (TSPU не блокирует server-to-server).
    location /api/ {
        proxy_pass         https://legirus-api.onrender.com;
        proxy_http_version 1.1;
        proxy_set_header   Host              legirus-api.onrender.com;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_ssl_server_name on;
        proxy_ssl_name        legirus-api.onrender.com;

        # Таймауты — Render бывает задумчив на cold start
        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;

        # Передаём Cache-Control от Render для CDN-эффекта (можно расширить через nginx cache)
        proxy_pass_request_headers on;
    }

    # /assets/maps — карты площадок тоже на Render (см. vercel.json)
    location /assets/maps/ {
        proxy_pass         https://legirus-api.onrender.com;
        proxy_http_version 1.1;
        proxy_set_header   Host legirus-api.onrender.com;
        proxy_ssl_server_name on;
        proxy_ssl_name        legirus-api.onrender.com;
        expires 7d;
        add_header Cache-Control "public";
    }

    # ───────── HTML (SPA fallback) ─────────
    # Любой неизвестный путь — отдаём index.html (React Router сам разберётся)
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, must-revalidate" always;
    }

    # Ограничения на размер upload
    client_max_body_size 10M;
}
