<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background — деep navy + accent gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a4ba0"/>
      <stop offset="100%" stop-color="#0d2858"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#ffd000"/>
    </linearGradient>
  </defs>

  <!-- Rounded square (safe-area aware: 10% padding) -->
  <rect x="0" y="0" width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Large «А» from АванDата with Latin D accent -->
  <text x="256" y="340" font-family="Helvetica, Arial, sans-serif" font-weight="900"
        font-size="280" text-anchor="middle" fill="url(#textGrad)">А</text>

  <!-- Small Latin D in bottom-right corner -->
  <text x="380" y="430" font-family="Helvetica, Arial, sans-serif" font-weight="900"
        font-size="100" text-anchor="middle" fill="#ffd000" opacity="0.92">D</text>

  <!-- Subtle football pattern in top-left -->
  <circle cx="100" cy="100" r="40" fill="none" stroke="#ffd000" stroke-width="3" opacity="0.25"/>
  <circle cx="100" cy="100" r="14" fill="#ffd000" opacity="0.4"/>
</svg>
