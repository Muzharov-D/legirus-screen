<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Векторный favicon. Прежняя версия была PNG в обёртке SVG — мутно
       выглядела на 16/32px и плохо читалась с прозрачным фоном.
       Сейчас — солидный красный квадрат (#dc2626 — бренд-цвет) и белая
       «Л». Читается на любой теме браузера, на retina не пикселит. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#991b1b"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="12" fill="url(#bg)"/>
  <text x="32" y="46" text-anchor="middle"
        font-family="Arial Black, Arial, sans-serif"
        font-weight="900" font-size="44"
        fill="#ffffff">Л</text>
</svg>
